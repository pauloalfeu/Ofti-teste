<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiAgenda — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Syne', sans-serif;
    background: #f8f7f3;
    color: #0d0d0d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 1.5rem;
    text-align: center;
  }
  .logo { font-size: 2rem; font-weight: 800; letter-spacing: -.04em; }
  .logo span { color: #00b87a; }
  .card {
    border: 2px solid #0d0d0d;
    background: #fff;
    box-shadow: 6px 6px 0 #0d0d0d;
    padding: 2rem 2.5rem;
    max-width: 420px;
    width: 100%;
  }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .5rem; }
  p { font-size: .875rem; color: #797977; line-height: 1.7; margin-bottom: 1.5rem; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: .7rem; background: #f0efe9; border: 1px solid #ddddd6; padding: 4px 10px; display: inline-block; color: #797977; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .08em;
    border: 2px solid #0d0d0d; cursor: pointer;
    background: #0d0d0d; color: #f8f7f3;
    box-shadow: 4px 4px 0 rgba(0,0,0,.2);
    text-decoration: none;
    transition: transform .12s, box-shadow .12s;
  }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,.25); }
  .tip { font-size: .72rem; color: #aaa; margin-top: 1rem; }
</style>
</head>
<body>
  <div class="logo">Opti<span>.</span>Agenda</div>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>Não foi possível conectar à internet. Os dados já salvos continuam disponíveis no seu dispositivo.</p>
    <span class="mono">status: sem conexão</span>
    <br><br>
    <a href="/" class="btn">↺ &nbsp;Tentar novamente</a>
    <p class="tip">Seus dados ficam salvos localmente — nenhuma informação é perdida offline.</p>
  </div>
</body>
</html>
